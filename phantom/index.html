<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<meta http-equiv="X-UA-Compatible" content="IE=edge"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="theme-color" content="#000000"/>
<meta name="author" content="Heri Kaniugu"/>
<link rel="manifest" href="manifest.json" />
<link rel="shortcut icon" href="favicon.ico">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<link rel="icon" type="image/png" href="icons/favicon-16.png" sizes="16x16">
<link rel="icon" type="image/png" href="icons/favicon-32.png" sizes="32x32">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap">
<style>
*, ::before, ::after { margin: 0px; padding: 0px; box-sizing: inherit; border: none; border-radius: 0px; outline: none; user-select: none; -webkit-tap-highlight-color: transparent; appearance: none; -webkit-appearance: none; }
::-webkit-scrollbar { width: 0px; height: 0px; display: none; }
::placeholder, ::-webkit-input-placeholder, ::-ms-input-placeholder, :-ms-input-placeholder { color: #484848; }
html { box-sizing: border-box; width: 100%; height: 100%; }
body { position: absolute; overflow: hidden; display: flex; flex-flow: column; width: 100%; height: 100%; background: #0d0d0d; color: white; font-family: 'Inter', Helvetica, sans-serif; }
input:-webkit-autofill, input:-webkit-autofill:hover, input:-webkit-autofill:focus, input:-webkit-autofill:active { box-shadow: 0 0 0 30px #202226 inset !important; }
input:-webkit-autofill { -webkit-text-fill-color: #afafaf !important; }
</style>
<script type="application/javascript">
if ("serviceWorker" in navigator) navigator.serviceWorker.register("worker.js").then(() => console.log("Service Worker registered."));
</script>
<script type="application/json">
{
    "name": "Phantom",
    "author": "Heri Kaniugu",
    "version": "1.0.0",
    "type": "js",
    "launch": "main",
    "preload": [
        "ui"
    ],
    "debug": true
}
</script>
<script type="text/javascript" src="engine.js"></script>
<title>Phantom</title>
</head>
<body></body>
</html>
